<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crabshack 🦀</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: rgb(239, 243, 255);
  --surface: #fff;
  --border: rgb(230, 230, 230);
  --text: rgb(25, 26, 26);
  --muted: rgb(113, 113, 122);
  --dim: rgb(128, 130, 135);
  --orange: rgb(255, 103, 24);
  --blue: rgb(37, 99, 235);
  --green: rgb(1, 110, 92);
  --dark: rgb(22, 23, 24);
  --font: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }

/* TOKEN GATE */
.gate {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.gate-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px; max-width: 480px; width: 100%;
  text-align: center;
}
.gate-box h1 { font-size: 28px; margin-bottom: 8px; }
.gate-box p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.gate-input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; font-family: var(--font);
  margin-bottom: 12px; outline: none;
}
.gate-input:focus { border-color: var(--blue); }
.gate-btn {
  width: 100%; padding: 10px; background: var(--orange); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
  font-family: var(--font); cursor: pointer;
}
.gate-btn:hover { opacity: .9; }
.gate-error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
.gate-hint { font-size: 11px; color: var(--dim); margin-top: 12px; }

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 99;
  background: var(--surface); border-bottom: 1px solid var(--border);
  height: 56px; display: flex; justify-content: space-between;
  align-items: center; padding: 0 24px; gap: 12px;
}
.nav-left { display: flex; gap: 8px; align-items: center; }
.nav-right { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 6px 14px; height: 34px; border: 0; border-radius: 6px;
  font-size: 12px; font-family: var(--font); font-weight: 500;
  cursor: pointer; color: #fff; background: rgb(35,38,37);
  white-space: nowrap; text-decoration: none; transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn.orange { background: var(--orange); }
.btn.ghost  { background: none; color: var(--muted); border: 1px solid var(--border); }
.btn.ghost:hover { color: var(--text); }
.issue-select {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; background: var(--surface); color: var(--text);
  cursor: pointer; min-width: 200px;
}

/* HERO */
.hero {
  background: var(--dark); color: #fff;
  padding: 24px; text-align: center;
}
.hero-issue { font-size: 28px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
.hero-meta  { font-size: 13px; color: #9ca3af; }

/* STATE */
.state {
  max-width: 728px; margin: 60px auto; text-align: center;
  font-size: 15px; color: var(--muted); padding: 0 16px;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* CONTENT */
.content { max-width: 728px; margin: 0 auto; padding: 32px 16px 80px; }
.copy-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.issue-body { font-size: 15px; line-height: 1.65; color: var(--text); }

.section-heading {
  font-size: 20px; font-weight: 800;
  margin: 36px 0 14px; padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.section-heading:first-child { margin-top: 0; }

.link-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.link-item:last-child { border-bottom: none; margin-bottom: 0; }
.link-outlet { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.link-url a { color: var(--blue); font-size: 13px; word-break: break-all; }
.link-context { font-size: 14px; color: #374151; line-height: 1.55; margin-top: 5px; }
.link-suplink { font-size: 12px; margin-top: 4px; }
.link-suplink a { color: var(--orange); }
.attr { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 4px; }

.copy-output {
  background: #1a1a1a; color: #e0e0e0;
  border-radius: 8px; padding: 20px;
  font-size: 12px; font-family: monospace;
  white-space: pre-wrap; word-break: break-word;
  max-height: 400px; overflow-y: auto;
  display: none; margin-top: 24px;
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: #fff; padding: 10px 20px;
  border-radius: 6px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; }

@media (max-width: 600px) {
  .nav { padding: 0 12px; }
  .issue-select { min-width: 140px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- TOKEN GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>🦀 crabshack</h1>
    <p>Enter your Airtable Personal Access Token to continue.<br>It'll be saved in your browser.</p>
    <input class="gate-input" id="tokenInput" type="password" placeholder="patXXXXXX..." autocomplete="off">
    <button class="gate-btn" onclick="saveToken()">Connect to Airtable</button>
    <div class="gate-error" id="gateError">Invalid token — couldn't reach Airtable.</div>
    <div class="gate-hint">Token is stored in localStorage and never sent anywhere except Airtable's API.</div>
  </div>
</div>

<!-- APP (hidden until authed) -->
<div id="app" style="display:none;">
  <div class="nav">
    <div class="nav-left">
      <select class="issue-select" id="issueSelect" onchange="loadIssue(this.value)">
        <option value="">Loading issues…</option>
      </select>
    </div>
    <div class="nav-right">
      <button class="btn" onclick="copyPlain()">📋 Copy text</button>
      <button class="btn orange" onclick="copySubstack()">⚡ Copy for Substack</button>
      <button class="btn ghost" onclick="togglePreview()">👁 Preview HTML</button>
      <button class="btn ghost" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-issue" id="heroTitle">crabshack 🦀</div>
    <div class="hero-meta" id="heroMeta">Select an issue</div>
  </div>

  <div class="content">
    <div id="loadingState" class="state" style="display:none;">
      <div class="spinner"></div>Loading…
    </div>
    <div id="errorState" class="state" style="display:none; color:#ef4444;"></div>
    <div id="issueContent" style="display:none;">
      <div class="copy-bar">
        <button class="btn" onclick="copyPlain()">📋 Copy plain text</button>
        <button class="btn orange" onclick="copySubstack()">⚡ Copy for Substack</button>
        <button class="btn ghost" onclick="togglePreview()">👁 Preview HTML</button>
      </div>
      <div class="copy-output" id="copyPreview"></div>
      <div class="issue-body" id="issueBody"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE         = 'appdZxHrsaZRxyx0H';
const ISSUES_TABLE = 'tblDg4PW4ZhXPvXuc';
const LINKS_TABLE  = 'tbl6G5RaBCdqIIf7p';
const TOKEN_KEY    = 'crabshack_token';

const SECTION_ORDER = [
  'Viral Topics','Shell 1','Trending','Brand News','Brand W',
  'Industry News',"Hey, So That's Bad!",'Aesthetic','Entertainment'
];
const SECTION_EMOJI = {
  'Viral Topics':        '🦀📱 Viral Topics',
  'Shell 1':             '🐚 Shell 1',
  'Trending':            '🦀 Trending',
  'Brand News':          '🦀 Brand News',
  'Brand W':             '🏆🦀 Brand W',
  'Industry News':       '📡🥴🦀 Industry News',
  "Hey, So That's Bad!":'💥🦀 Hey, So That\'s Bad!',
  'Aesthetic':           '🎀🦀 Aesthetic',
  'Entertainment':       '🎧🍿🦀 Entertainment',
};

let TOKEN = '';
let allIssues = [];
let currentLinks = [];

// ── AUTH ──────────────────────────────────────────────
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

async function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  // Validate by hitting the API
  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${BASE}/${ISSUES_TABLE}?maxRecords=1`,
      { headers: { Authorization: `Bearer ${val}` } }
    );
    if (!res.ok) throw new Error();
    localStorage.setItem(TOKEN_KEY, val);
    TOKEN = val;
    showApp();
  } catch {
    document.getElementById('gateError').style.display = 'block';
  }
}

function signOut() {
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}

function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}

// ── AIRTABLE ──────────────────────────────────────────
async function at(table, qs = '') {
  const res = await fetch(
    `https://api.airtable.com/v0/${BASE}/${table}?${qs}`,
    { headers: { Authorization: `Bearer ${TOKEN}` } }
  );
  if (!res.ok) throw new Error(`Airtable ${res.status}`);
  return res.json();
}

async function fetchAll(table, qs = '') {
  let records = [], offset;
  do {
    const q = offset ? `${qs}&offset=${offset}` : qs;
    const d = await at(table, q);
    records = records.concat(d.records || []);
    offset = d.offset;
  } while (offset);
  return records;
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('loadingState').innerHTML = '<div class="spinner"></div>Fetching issues…';
  try {
    const issues = await fetchAll(ISSUES_TABLE,
      'fields[]=Publishing+Status&fields[]=Links&fields[]=Issue+Preview&fields[]=checklist_blurb'
    );
    // Sort by createdTime desc (most recent first)
    issues.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));
    allIssues = issues;

    const sel = document.getElementById('issueSelect');
    sel.innerHTML = '';
    issues.forEach((issue, i) => {
      const date = new Date(issue.createdTime).toLocaleDateString('en-US',
        { month: 'short', day: 'numeric', year: 'numeric' });
      const status = issue.fields['Publishing Status'] || 'Draft';
      const n = issues.length - i;
      const opt = document.createElement('option');
      opt.value = issue.id;
      opt.textContent = `Issue #${n} — ${date} (${status})`;
      sel.appendChild(opt);
    });

    document.getElementById('loadingState').style.display = 'none';
    if (issues.length) loadIssue(issues[0].id);
  } catch(e) { showError(e.message); }
}

// ── LOAD ISSUE ────────────────────────────────────────
async function loadIssue(issueId) {
  if (!issueId) return;
  const issue = allIssues.find(i => i.id === issueId);
  if (!issue) return;

  document.getElementById('issueContent').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('loadingState').innerHTML = '<div class="spinner"></div>Loading links…';

  try {
    const n = allIssues.length - allIssues.indexOf(issue);
    const date = new Date(issue.createdTime).toLocaleDateString('en-US',
      { month: 'long', day: 'numeric', year: 'numeric' });
    const linkCount = (issue.fields['Links'] || []).length;

    document.getElementById('heroTitle').textContent = `Issue #${n} — ${date}`;
    document.getElementById('heroMeta').textContent =
      `${linkCount} links · ${issue.fields['Publishing Status'] || 'Draft'}`;

    // Fetch links for this issue
    const formula = encodeURIComponent(`SEARCH("${issueId}", ARRAYJOIN(Issue, ","))`);
    const links = await fetchAll(LINKS_TABLE,
      `filterByFormula=${formula}&fields[]=URL&fields[]=Category&fields[]=OG+Discord+Message&fields[]=Status`
    );

    const ready = links.filter(l => {
      const s = l.fields['Status'];
      return !s || ['Ready for Substack','Published','Approved'].includes(s);
    });

    currentLinks = ready;
    renderIssue(ready);
  } catch(e) { showError(e.message); }
}

// ── RENDER ────────────────────────────────────────────
function parseOG(link) {
  try {
    const raw = (link.fields['OG Discord Message'] || '').replace(/^LINK:\s*/, '');
    const p = JSON.parse(raw);
    return {
      context: p.context || '',
      suplink: p.suplink || '',
      goodRead: p.good_read || '',
      submittedBy: (p.submitted_by || '').replace(/^qwn/, ''),
    };
  } catch { return { context:'', suplink:'', goodRead:'', submittedBy:'' }; }
}

function outletFromURL(url) {
  try {
    return new URL(url).hostname.replace('www.','');
  } catch { return ''; }
}

function groupLinks(links) {
  const grouped = {};
  links.forEach(l => {
    const cat = l.fields['Category'] || 'Uncategorized';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(l);
  });
  const sections = [];
  SECTION_ORDER.forEach(cat => {
    if (grouped[cat]) { sections.push({ cat, links: grouped[cat] }); delete grouped[cat]; }
  });
  Object.entries(grouped).forEach(([cat, lnks]) => sections.push({ cat, links: lnks }));
  return sections;
}

function renderIssue(links) {
  const sections = groupLinks(links);
  let html = '';
  sections.forEach(({ cat, links }) => {
    const heading = SECTION_EMOJI[cat] || `🦀 ${cat}`;
    html += `<div class="section-heading">${heading}</div>`;
    links.forEach(link => {
      const url = link.fields['URL'] || '';
      const og = parseOG(link);
      const outlet = outletFromURL(url);
      html += `<div class="link-item">`;
      if (outlet) html += `<div class="link-outlet">${outlet}</div>`;
      html += `<div class="link-url"><a href="${url}" target="_blank">${url}</a></div>`;
      if (og.context) html += `<div class="link-context">${og.context}</div>`;
      if (og.suplink) html += `<div class="link-suplink"><a href="${og.suplink}" target="_blank">${og.suplink}</a></div>`;
      if (og.submittedBy) html += `<div class="attr">[🦀 ${og.submittedBy}]</div>`;
      html += `</div>`;
    });
  });

  document.getElementById('issueBody').innerHTML = html;
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('issueContent').style.display = 'block';
}

// ── COPY ──────────────────────────────────────────────
function buildSubstackHTML() {
  const sections = groupLinks(currentLinks);
  let out = '';
  sections.forEach(({ cat, links }) => {
    out += `<h2>${SECTION_EMOJI[cat] || '🦀 ' + cat}</h2>\n`;
    links.forEach(link => {
      const url = link.fields['URL'] || '';
      const og = parseOG(link);
      const outlet = outletFromURL(url);
      out += `<p>`;
      if (outlet) out += `<strong>(${outlet})</strong> `;
      out += `<a href="${url}">${url}</a>`;
      if (og.context) out += `<br>${og.context}`;
      if (og.submittedBy) out += `<br><em>[🦀 ${og.submittedBy}]</em>`;
      out += `</p>\n`;
      if (og.suplink) out += `<p><a href="${og.suplink}">${og.suplink}</a></p>\n`;
    });
    out += '\n';
  });
  return out;
}

function buildPlainText() {
  const sections = groupLinks(currentLinks);
  let out = '';
  sections.forEach(({ cat, links }) => {
    out += `\n${SECTION_EMOJI[cat] || '🦀 ' + cat}\n${'─'.repeat(40)}\n\n`;
    links.forEach(link => {
      const url = link.fields['URL'] || '';
      const og = parseOG(link);
      out += `${url}\n`;
      if (og.context) out += `${og.context}\n`;
      if (og.submittedBy) out += `[🦀 ${og.submittedBy}]\n`;
      if (og.suplink) out += `${og.suplink}\n`;
      out += '\n';
    });
  });
  return out.trim();
}

async function copyPlain() {
  await navigator.clipboard.writeText(buildPlainText());
  toast('✓ Plain text copied!');
}

async function copySubstack() {
  const html = buildSubstackHTML();
  try {
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([html], { type: 'text/plain' }),
      })
    ]);
    toast('✓ Substack HTML copied — paste into editor!');
  } catch {
    await navigator.clipboard.writeText(html);
    toast('✓ HTML copied as plain text');
  }
}

function togglePreview() {
  const el = document.getElementById('copyPreview');
  if (el.style.display === 'none' || !el.style.display) {
    el.textContent = buildSubstackHTML();
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

// ── UTILS ─────────────────────────────────────────────
function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  const el = document.getElementById('errorState');
  el.style.display = 'block';
  el.textContent = `Error: ${msg}`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── BOOT ──────────────────────────────────────────────
TOKEN = getToken();
if (TOKEN) {
  showApp();
} else {
  document.getElementById('gate').style.display = 'flex';
}
</script>
</body>
</html>
