<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crabshack 🦀</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: rgb(239, 243, 255);
  --surface: #fff;
  --border: rgb(230, 230, 230);
  --text: #374151;
  --dark: rgb(22, 23, 24);
  --orange: rgb(255, 103, 24);
  --blue: rgb(37, 99, 235);
  --green: rgb(1, 110, 92);
  --font: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  --font-georgia: 'Georgia', 'Times New Roman', serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }

/* GATE */
.gate { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.gate-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:40px; max-width:480px; width:100%; text-align:center; }
.gate-box h1 { font-size:28px; margin-bottom:8px; }
.gate-box p { font-size:14px; color:#6b7280; margin-bottom:24px; }
.gate-input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:var(--font); margin-bottom:12px; outline:none; }
.gate-input:focus { border-color:var(--blue); }
.gate-btn { width:100%; padding:10px; background:var(--orange); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; font-family:var(--font); cursor:pointer; }
.gate-error { color:#ef4444; font-size:13px; margin-top:8px; display:none; }
.gate-hint { font-size:11px; color:#9ca3af; margin-top:12px; }

/* NAV */
.nav { position:sticky; top:0; z-index:99; background:var(--surface); border-bottom:1px solid var(--border); height:56px; display:flex; justify-content:space-between; align-items:center; padding:0 24px; gap:12px; }
.nav-left { display:flex; gap:8px; align-items:center; }
.nav-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn { display:inline-flex; align-items:center; justify-content:center; padding:6px 14px; height:34px; border:0; border-radius:6px; font-size:12px; font-family:var(--font); font-weight:500; cursor:pointer; color:#fff; background:rgb(35,38,37); white-space:nowrap; text-decoration:none; }
.btn:hover { opacity:.85; }
.btn.orange { background:var(--orange); }
.btn.ghost { background:none; color:#6b7280; border:1px solid var(--border); }
.btn.ghost:hover { color:var(--text); }
.issue-select { font-family:var(--font); font-size:13px; font-weight:600; border:1px solid var(--border); border-radius:6px; padding:6px 10px; background:var(--surface); color:var(--text); cursor:pointer; min-width:200px; }

/* HERO */
.hero { background:var(--dark); color:#fff; padding:24px; text-align:center; }
.hero-issue { font-size:28px; font-weight:700; letter-spacing:-.02em; margin-bottom:6px; }
.hero-meta { font-size:13px; color:#9ca3af; }

/* STATE */
.state { max-width:728px; margin:60px auto; text-align:center; font-size:15px; color:#6b7280; padding:0 16px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* CONTENT */
.content { max-width:728px; margin:0 auto; padding:32px 16px 80px; }
.copy-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }

/* ISSUE BODY — matches WeWeb exactly */
.issue-body {
  font-size: 19px;
  font-family: var(--font);
  font-weight: 400;
  line-height: 1.6em;
  color: var(--text);
}
.issue-body h2 {
  font-size: 27px;
  font-family: var(--font);
  font-weight: 800;
  color: #1f2937;
  margin-top: 24px;
  margin-bottom: 12px;
}
.issue-body p {
  font-size: 16px;
  font-family: var(--font);
  font-weight: 400;
  color: #374151;
  line-height: 1.6;
  margin-top: 16px;
  margin-bottom: 16px;
}
.issue-body a {
  color: #f26849;
  text-decoration: underline;
  font-size: 16px;
  font-family: 'Inter', 'Helvetica Neue', sans-serif;
  font-weight: 500;
}
.issue-body li {
  font-size: 16px;
  font-family: var(--font);
  line-height: 1.6;
  margin-bottom: 6px;
  list-style: none;
}
.issue-body li a {
  text-decoration: underline;
  color: #f26849;
}
.issue-body blockquote {
  color: #4b5563;
  background: #f9fafb;
  border-left: 4px solid #1e40af;
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 4px;
  font-size: 16px;
  font-style: italic;
  line-height: 1.6;
}
.issue-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.issue-body .section { margin-bottom: 8px; }
.issue-body .sup-link { display:block; font-size:14px; margin-top:4px; color:#6b7280; }
.issue-body .sup-link a { color:#6b7280; font-size:14px; }

/* HTML preview */
.copy-output { background:#1a1a1a; color:#e0e0e0; border-radius:8px; padding:20px; font-size:12px; font-family:monospace; white-space:pre-wrap; word-break:break-word; max-height:400px; overflow-y:auto; display:none; margin-top:24px; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--dark); color:#fff; padding:10px 20px; border-radius:6px; font-size:13px; font-weight:500; opacity:0; transition:opacity .2s; pointer-events:none; z-index:9999; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>🦀 crabshack</h1>
    <p>Enter your Airtable Personal Access Token to continue.<br>Stored in your browser only.</p>
    <input class="gate-input" id="tokenInput" type="password" placeholder="patXXXXXX..." autocomplete="off">
    <button class="gate-btn" onclick="saveToken()">Connect to Airtable</button>
    <div class="gate-error" id="gateError">Invalid token — could not reach Airtable.</div>
    <div class="gate-hint">Token is stored in localStorage and never sent anywhere except Airtable's API.</div>
  </div>
</div>

      <button class="btn" onclick="copyPlain()">Copy text</button>

<script>

const ISSUES_TABLE  = 'tblDg4PW4ZhXPvXuc';

// Section order + headings exactly as in WeWeb
const SECTIONS = [
  { key: 'Viral Topics',         h: '📲🦀 Viral Topics',          style: 'viral' },
  { key: 'Shell 1',              h: '🐚 Shell 1',                  style: 'list' },
  { key: 'Shell 2',              h: '🐚 Shell 2',                  style: 'list' },
  { key: 'Trending',             h: '🦀 Trending',                 style: 'trends' },
  { key: 'Brand News',           h: '🦀 Brand News',               style: 'list' },
  { key: 'Brand L',              h: '👎🦀 Brand L',                style: 'brandwl', intro: 'If we can give out Ws, we can hand out an L, too:' },
  { key: 'Brand W',              h: '🏆🦀 Brand W',               style: 'brandwl', intro: 'Not all brands deserve a W, but this one does:' },

  { key: 'Entertainment',        h: '🎧🍿🦀 Entertainment',       style: 'list' },
  { key: 'End Link',             h: null,                           style: 'endlink' },
];

let TOKEN = '';
let allIssues = [];
let currentLinks = [];
let currentTrends = [];

// AUTH
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

async function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${BASE}/${ISSUES_TABLE}?maxRecords=1`,
      { headers: { Authorization: `Bearer ${val}` } }
    );
    if (!res.ok) throw new Error();
    localStorage.setItem(TOKEN_KEY, val);
    TOKEN = val;
    showApp();
  } catch {
    document.getElementById('gateError').style.display = 'block';
  }
}

function signOut() { localStorage.removeItem(TOKEN_KEY); location.reload(); }

function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}

// AIRTABLE
async function at(table, qs) {
  const res = await fetch(
    `https://api.airtable.com/v0/${BASE}/${table}?${qs}`,
    { headers: { Authorization: `Bearer ${TOKEN}` } }
  );
  if (!res.ok) throw new Error('Airtable ' + res.status);
  return res.json();
}

async function fetchAll(table, qs) {
  let records = [], offset;
  do {
    const q = offset ? qs + '&offset=' + offset : qs;
    const d = await at(table, q);
    records = records.concat(d.records || []);
    offset = d.offset;
  } while (offset);
  return records;
}

// INIT
async function init() {
  document.getElementById('loadingState').innerHTML = '<div class="spinner"></div>Fetching issues...';
  document.getElementById('loadingState').style.display = 'block';
  try {
    const [currentIssues, allForDropdown] = await Promise.all([
      fetchAll(ISSUES_TABLE, 'view=ONLY+OPEN+ISSUE&fields[]=Publishing+Status&fields[]=Links&fields[]=Issue+%23&fields[]=Issue+Date'),
      fetchAll(ISSUES_TABLE, 'fields[]=Publishing+Status&fields[]=Issue+%23&fields[]=Issue+Date')
    ]);

    allForDropdown.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));
    allIssues = allForDropdown;
    const currentId = currentIssues.length ? currentIssues[0].id : null;

    const sel = document.getElementById('issueSelect');
    sel.innerHTML = '';

    if (currentId) {
      const cur = allForDropdown.find(i => i.id === currentId);
      const opt = document.createElement('option');
      opt.value = currentId;
      const issueNum = cur?.fields['Issue #'] || '';
      const date = cur?.fields['Issue Date'] || new Date(cur.createdTime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      opt.textContent = 'Current Issue #' + issueNum + ' -- ' + date;
      sel.appendChild(opt);
      const div = document.createElement('option');
      div.disabled = true;
      div.textContent = '------------------';
      sel.appendChild(div);
    }

    allForDropdown.forEach(issue => {
      if (issue.id === currentId) return;
      const opt = document.createElement('option');
      opt.value = issue.id;
      const n = issue.fields['Issue #'] || '';
      const d = issue.fields['Issue Date'] || new Date(issue.createdTime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const s = issue.fields['Publishing Status'] || 'Draft';
      opt.textContent = 'Issue #' + n + ' -- ' + d + ' (' + s + ')';
      sel.appendChild(opt);
    });

    document.getElementById('loadingState').style.display = 'none';
    loadIssue(currentId || (allForDropdown.length ? allForDropdown[0].id : null));
  } catch(e) { showError(e.message); }
}

// LOAD ISSUE
async function loadIssue(issueId) {
  if (!issueId) return;
  const issue = allIssues.find(i => i.id === issueId);

  document.getElementById('issueContent').style.display = 'none';
  document.getElementById('loadingState').innerHTML = '<div class="spinner"></div>Loading links...';
  document.getElementById('loadingState').style.display = 'block';

  try {
    const n = issue?.fields['Issue #'] || '';
    const date = issue?.fields['Issue Date'] || new Date(issue.createdTime).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    document.getElementById('heroMeta').textContent = 'Issue #' + n + ' -- ' + date + ' | ' + (issue?.fields['Publishing Status'] || 'Draft');


    // Fetch links and trends in parallel
    const [links, trends] = await Promise.all([
      fetchAll(LINKS_TABLE,
        'view=' + encodeURIComponent(LINKS_VIEW) +
        '&fields[]=Title&fields[]=URL&fields[]=Category' +
        '&fields[]=Context&fields[]=Description' +
        '&fields[]=Supportive+Content+URL&fields[]=Link+Summary' +
        '&fields[]=Submitter&fields[]=Name+(from+Outlet)' +
        '&fields[]=Good+Read%3F&fields[]=Resource%3F&fields[]=Credit+to&fields[]=Status'
      ),
      fetchAll(TRENDS_TABLE,
        'fields[]=Name&fields[]=Formatted+Blurb&fields[]=List+of+examples&fields[]=Fresh+Catch%3F&fields[]=Status'
      ).catch(() => [])
    ]);

    currentLinks = links;
    currentTrends = trends;
    renderIssue(links, trends);
  } catch(e) { showError(e.message); }
}

// RENDER — exactly matching WeWeb formulas
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLink(item, style) {
  const f = item.fields;
  const title = f['Title'] || '';
  const url = f['URL'] || '';
  const outlet = (f['Name (from Outlet)'] || [])[0] || '';
  const summary = f['Link Summary']?.value || '';
  const context = f['Context'] || '';
  const description = f['Description'] || '';
  const supUrl = f['Supportive Content URL'] || '';
  const submitter = (f['Submitter'] || [])[0] || '';
  const creditTo = (f['Credit to'] || [])[0] || '';
  const isGoodRead = f['Good Read?'] === true;
  const isResource = f['Resource?'] === true;

  let html = '';

  if (style === 'viral') {
    // Viral Topics: bold title (outlet), summary, context, suplink
    let prefix = '';
    if (isGoodRead) prefix = '<b>Good Read:</b> ';
    if (isResource) prefix = '<b>Resource:</b> ';

    html += '<div class="section">';
    html += prefix;
    html += '<b>' + esc(title) + '</b>';
    if (outlet) html += ' (<a style="text-decoration:underline;" href="' + esc(url) + '">' + esc(outlet) + '</a>)';
    if (summary) html += '<br>' + summary;
    if (context) html += '<br><br> 🦀 ' + esc(context);
    if (supUrl) html += '<br><span class="sup-link"><a href="' + esc(supUrl) + '">' + esc(supUrl) + '</a></span>';
    html += '</div>';

  } else if (style === 'brandwl') {
    // Brand W/L: just URL as link + blockquote if context
    html += '<li>';
    html += '<a style="text-decoration:underline;" href="' + esc(url) + '">' + esc(url) + '</a>';
    html += '</li>';
    if (context) {
      html += '<blockquote>';
      html += '<span>' + esc(context) + '</span>';
      if (submitter) {
        html += '[🦀 <span><a href="' + esc(creditTo) + '">' + esc(submitter) + '</a></span>]';
      }
      html += '</blockquote>';
    }
    html += '<br>';

  } else {
    // Standard list: <li>Title (Outlet)</li> + blockquote if context, Good Read / Resource prefix
    let prefix = '';
    if (isGoodRead) prefix = '<b>Good Read:</b> ';
    if (isResource) prefix = '<b>Resource:</b> ';

    if (isGoodRead || isResource) {
      // Good Read / Resource format (same as viral for these)
      html += '<div class="section">';
      html += prefix;
      html += esc(title);
      if (outlet) html += ' (<a style="text-decoration:underline;" href="' + esc(url) + '">' + esc(outlet) + '</a>)';
      if (summary) html += '<br>' + summary;
      if (supUrl) html += '<br><span class="sup-link"><a href="' + esc(supUrl) + '">' + esc(supUrl) + '</a></span>';
      html += '</div>';
    } else {
      html += '<li>';
      html += esc(title);
      if (outlet) html += ' (<a style="text-decoration:underline;" href="' + esc(url) + '">' + esc(outlet) + '</a>)';
      if (description) {
        html += '<ul><li>' + esc(description) + '[' + esc(submitter) + ']</li></ul>';
      }
      if (context) {
        html += '<blockquote><span>' + esc(context) + '</span>[🦀 <span><a href="' + esc(creditTo) + '">' + esc(submitter) + '</a></span>]</blockquote>';
      }
      html += '</li>';
      if (supUrl) html += '<span class="sup-link"><a href="' + esc(supUrl) + '">' + esc(supUrl) + '</a></span>';
    }
  }

  return html;
}

function renderTrend(item) {
  const f = item.fields;
  const name = f['Name'] || '';
  const blurb = f['Formatted Blurb'] || '';
  const examples = (f['List of examples'] || [])[0] || '';
  const isFresh = f['Fresh Catch?'] === true;

  let html = '<div class="section">';
  if (isFresh) {
    html += '<b>Fresh Catch: ' + esc(name) + '</b><br>' + blurb + examples;
  } else {
    html += '<b>' + esc(name) + '</b><br>' + blurb + examples + '<br>';
  }
  html += '</div>';
  return html;
}

function renderIssue(links, trends) {
  // Group links by category
  const byCategory = {};
  links.forEach(l => {
    const cat = l.fields['Category'] || 'Uncategorized';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(l);
  });

  let html = '';

  SECTIONS.forEach(sec => {
    if (sec.style === 'trends') {
      if (!trends.length) return;
      html += '<h2>' + sec.h + '</h2>';
      const fresh = trends.filter(t => t.fields['Fresh Catch?'] === true);
      const regular = trends.filter(t => t.fields['Fresh Catch?'] !== true);
      fresh.forEach(t => { html += renderTrend(t); });
      regular.forEach(t => { html += renderTrend(t); });
      return;
    }

    if (sec.style === 'endlink') {
      const items = byCategory['End Link'] || [];
      if (!items.length) return;
      html += '<hr>';
      items.forEach(item => {
        const url = item.fields['URL'] || '';
        html += '<p><a href="' + esc(url) + '">' + esc(url) + '</a></p>';
      });
      return;
    }

    const items = byCategory[sec.key] || [];
    if (!items.length) return;

    if (sec.h) html += '<h2>' + sec.h + '</h2>';
    if (sec.intro) html += '<p>' + sec.intro + '</p>';

    items.forEach(item => {
      html += renderLink(item, sec.style);
    });
  });

  // Footer
  html += '<hr>';
  html += '<p style="color:rgb(242,103,73);font-weight:bold;font-size:19px;">We hope you enjoyed this installment of Silence, Brand!&#x2014;a tri-weekly, late-night potluck of internet absurdity 🦀</p>';
  html += '<p><a href="https://www.linkedin.com/in/ryan-benson/" style="color:rgb(242,103,73);">Ryan Benson</a> &bull; <a href="https://www.linkedin.com/in/daynabeck/" style="color:rgb(242,103,73);">Dayna Castillo</a> &bull; <a href="https://www.linkedin.com/in/dejaih-smith/" style="color:rgb(242,103,73);">Dejaih Smith</a> &bull; <a href="https://www.linkedin.com/in/qwnjanine/" style="color:rgb(242,103,73);">Janine Davis</a></p>';
  html += '<p>Our team of award-winning brand marketers and culture experts trawls the depths of the social internet, catching trends as they bubble up, so you\'re prepared when they surface.<br>In addition to our newsletter, we offer bespoke cultural intelligence services for agencies and in-house teams, providing brand-tailored reports and insights to equip partners with the tools (and taste) to stay culturally fluent in a world that never stops posting.</p>';
  html += '<p>For all media pitches, service inquiries, story pitches and anything related to this here newsletter, hit us up at: <a href="mailto:editor@silencebrand.net">editor@silencebrand.net</a> 🦀<br>Follow our <a href="https://www.linkedin.com/company/silencebrand">LinkedIn</a> for updates and occasional shitposts.</p>';

  document.getElementById('issueBody').innerHTML = html;
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('issueContent').style.display = 'block';
}

// COPY
function buildSubstackHTML() {
  return document.getElementById('issueBody').innerHTML;
}

async function copyPlain() {
  const text = document.getElementById('issueBody').innerText;
  await navigator.clipboard.writeText(text);
  toast('Plain text copied!');
}

async function copySubstack() {
  const html = buildSubstackHTML();
  try {
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([html], { type: 'text/plain' }),
      })
    ]);
    toast('Substack HTML copied -- paste into editor!');
  } catch {
    await navigator.clipboard.writeText(html);
    toast('HTML copied as text');
  }
}

function togglePreview() {
  const el = document.getElementById('copyPreview');
  if (el.style.display === 'none' || !el.style.display) {
    el.textContent = buildSubstackHTML();
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  const el = document.getElementById('errorState');
  el.style.display = 'block';
  el.textContent = 'Error: ' + msg;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

TOKEN = getToken();
if (TOKEN) showApp();
else document.getElementById('gate').style.display = 'flex';
